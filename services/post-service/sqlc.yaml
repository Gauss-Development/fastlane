version: "2"
sql:
  - engine: "postgresql"
    schema:
      - "migrations"           # sqlc reads .up.sql files as the schema
    queries:
      - "internal/infrastructure/postgres/queries"
    gen:
      go:
        package: "sqlcgen"
        out: "internal/infrastructure/postgres/sqlcgen"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_db_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
        emit_empty_slices: true
        emit_pointers_for_null_types: true
        overrides:
          # pgvector ↔ Go: github.com/pgvector/pgvector-go provides
          # Valuer/Scanner-friendly Vector type.
          - column: "products.embedding"
            go_type:
              import: "github.com/pgvector/pgvector-go"
              type: "Vector"
              pointer: true
