services:
  # Infrastructure Services
  redis:
    image: redis:7-alpine
    container_name: microservices_redis
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    command: ["sh", "-c", "redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass \"$${REDIS_PASSWORD}\""]
    networks:
      - internal_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # PostgreSQL for User Service
  postgres_user:
    image: pgvector/pgvector:pg17
    container_name: microservices_postgres_user
    environment:
      POSTGRES_DB: userdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_USER_PASSWORD:?POSTGRES_USER_PASSWORD is required}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    expose:
      - "5432"
    volumes:
      - postgres_user_data:/var/lib/postgresql/data
      - ./scripts/postgres-init-user.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - internal_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d userdb"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # PostgreSQL for Post Service
  postgres_post:
    image: pgvector/pgvector:pg17
    container_name: microservices_postgres_post
    environment:
      POSTGRES_DB: postdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_POST_PASSWORD:?POSTGRES_POST_PASSWORD is required}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    expose:
      - "5432"
    # Bind to 127.0.0.1 only — for local seed/embed CLIs that run on the host.
    ports:
      - "127.0.0.1:${POSTGRES_POST_HOST_PORT:-15432}:5432"
    volumes:
      - postgres_post_data:/var/lib/postgresql/data
      - ./scripts/postgres-init-post.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - internal_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postdb"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # PostgreSQL for Notification Service
  postgres_notification:
    image: pgvector/pgvector:pg17
    container_name: microservices_postgres_notification
    environment:
      POSTGRES_DB: notificationdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_NOTIFICATION_PASSWORD:?POSTGRES_NOTIFICATION_PASSWORD is required}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    expose:
      - "5432"
    volumes:
      - postgres_notification_data:/var/lib/postgresql/data
      - ./scripts/postgres-init-notification.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - internal_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d notificationdb"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # PostgreSQL for Design Service
  postgres_design:
    image: pgvector/pgvector:pg16
    container_name: microservices_postgres_design
    environment:
      POSTGRES_DB: designdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_DESIGN_PASSWORD:?POSTGRES_DESIGN_PASSWORD is required}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    expose:
      - "5432"
    volumes:
      - postgres_design_data:/var/lib/postgresql/data
      - ./scripts/postgres-init-design.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - internal_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d designdb"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # PostgreSQL for Catalog Service
  postgres_catalog:
    image: pgvector/pgvector:pg16
    container_name: microservices_postgres_catalog
    environment:
      POSTGRES_DB: catalogdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_CATALOG_PASSWORD:?POSTGRES_CATALOG_PASSWORD is required}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    expose:
      - "5432"
    volumes:
      - postgres_catalog_data:/var/lib/postgresql/data
      - ./scripts/postgres-init-catalog.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - internal_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d catalogdb"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Object storage for design files (presigned S3 URLs handed to the browser)
  minio:
    image: minio/minio:latest
    container_name: microservices_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    ports:
      - "9000:9000"    # S3 API — must be host-reachable so presigned URLs work in the browser
      - "9001:9001"    # Console
    volumes:
      - minio_data:/data
    networks:
      - internal_net
      - edge_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # One-shot: create the design bucket via the INTERNAL minio endpoint.
  createbuckets:
    image: minio/mc
    container_name: microservices_createbuckets
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required} &&
      mc mb --ignore-existing myminio/${S3_BUCKET:-design-files}
      "
    networks:
      - internal_net
    restart: "no"

  # Message Queue
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: microservices_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:?RABBITMQ_USER is required}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:?RABBITMQ_VHOST is required}
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-rabbit log_levels [{connection,error}]"
    expose:
      - "5672"         # AMQP port
      - "15672"        # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./config/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    networks:
      - internal_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Core Services
  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
      args:
        - BUILD_ENV=production
    container_name: microservices_auth_service
    expose:
      - "${AUTH_SERVICE_PORT:-8081}"
      - "50051"
    env_file:
      - ./services/auth-service/.env
    environment:
      PORT: ${AUTH_SERVICE_PORT:-8081}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      SERVICE_TRANSPORT_SECURITY: ${SERVICE_TRANSPORT_SECURITY:?SERVICE_TRANSPORT_SECURITY must be mesh or app_mtls}
      INTERNAL_HTTP_TRUST_MODE: ${INTERNAL_HTTP_TRUST_MODE:?INTERNAL_HTTP_TRUST_MODE is required}
      GRPC_TLS_ENABLED: ${GRPC_TLS_ENABLED:-false}
      GRPC_TLS_CA_FILE: ${GRPC_TLS_CA_FILE:-}
      GRPC_TLS_CERT_FILE: ${GRPC_TLS_CERT_FILE:-}
      GRPC_TLS_KEY_FILE: ${GRPC_TLS_KEY_FILE:-}
      GRPC_TLS_REQUIRE_CLIENT_CERT: ${GRPC_TLS_REQUIRE_CLIENT_CERT:-false}
      GRPC_REFLECTION_ENABLED: ${GRPC_REFLECTION_ENABLED:-false}
      REDIS_URL: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      REDIS_DB: ${REDIS_DB:-0}
      USER_SERVICE_GRPC_ADDR: user-service:50052
      GOOGLE_REDIRECT_URL: ${GOOGLE_REDIRECT_URL:-http://localhost:8080/api/v1/auth/google/callback}
      GOOGLE_DEFAULT_WEB_REDIRECT_URI: ${GOOGLE_DEFAULT_WEB_REDIRECT_URI:-http://localhost:3000/auth/callback}
      GOOGLE_ALLOWED_WEB_REDIRECT_URIS: ${GOOGLE_ALLOWED_WEB_REDIRECT_URIS:-http://localhost:3000/auth/callback}
      GOOGLE_ALLOWED_MOBILE_REDIRECT_URIS: ${GOOGLE_ALLOWED_MOBILE_REDIRECT_URIS:-myapp://auth/callback}
      GOOGLE_ALLOWED_DOMAINS: ${GOOGLE_ALLOWED_DOMAINS:-}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-168}
      JWT_ISSUER: ${JWT_ISSUER:-auth-service}
      MAGIC_LINK_JWT_SECRET: ${MAGIC_LINK_JWT_SECRET:-}
      MAGIC_LINK_TTL_HOURS: ${MAGIC_LINK_TTL_HOURS:-336}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - internal_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${AUTH_SERVICE_PORT:-8081}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
      args:
        - BUILD_ENV=production
    container_name: microservices_user_service
    expose:
      - "${USER_SERVICE_PORT:-8082}"
      - "50052"
    env_file:
      - ./services/user-service/.env
    environment:
      PORT: ${USER_SERVICE_PORT:-8082}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      SERVICE_TRANSPORT_SECURITY: ${SERVICE_TRANSPORT_SECURITY:?SERVICE_TRANSPORT_SECURITY must be mesh or app_mtls}
      INTERNAL_HTTP_TRUST_MODE: ${INTERNAL_HTTP_TRUST_MODE:?INTERNAL_HTTP_TRUST_MODE is required}
      GRPC_TLS_ENABLED: ${GRPC_TLS_ENABLED:-false}
      GRPC_TLS_CA_FILE: ${GRPC_TLS_CA_FILE:-}
      GRPC_TLS_CERT_FILE: ${GRPC_TLS_CERT_FILE:-}
      GRPC_TLS_KEY_FILE: ${GRPC_TLS_KEY_FILE:-}
      GRPC_TLS_REQUIRE_CLIENT_CERT: ${GRPC_TLS_REQUIRE_CLIENT_CERT:-false}
      GRPC_REFLECTION_ENABLED: ${GRPC_REFLECTION_ENABLED:-false}
      DATABASE_URL: postgres://postgres:${POSTGRES_USER_PASSWORD:?POSTGRES_USER_PASSWORD is required}@postgres_user:5432/userdb?sslmode=disable
      DB_MAX_OPEN_CONNS: ${DB_MAX_OPEN_CONNS:-25}
      DB_MAX_IDLE_CONNS: ${DB_MAX_IDLE_CONNS:-10}
      DB_CONN_MAX_LIFETIME: ${DB_CONN_MAX_LIFETIME:-60}
      DB_MIGRATION_PATH: ${DB_MIGRATION_PATH:-./migrations}
    depends_on:
      postgres_user:
        condition: service_healthy
    networks:
      - internal_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${USER_SERVICE_PORT:-8082}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  post-service:
    build:
      context: .
      dockerfile: services/post-service/Dockerfile
      args:
        - BUILD_ENV=production
    container_name: microservices_post_service
    expose:
      - "${POST_SERVICE_PORT:-8083}"
      - "50053"
    env_file:
      - ./services/post-service/.env
    environment:
      PORT: ${POST_SERVICE_PORT:-8083}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      SERVICE_TRANSPORT_SECURITY: ${SERVICE_TRANSPORT_SECURITY:?SERVICE_TRANSPORT_SECURITY must be mesh or app_mtls}
      INTERNAL_HTTP_TRUST_MODE: ${INTERNAL_HTTP_TRUST_MODE:?INTERNAL_HTTP_TRUST_MODE is required}
      GRPC_TLS_ENABLED: ${GRPC_TLS_ENABLED:-false}
      GRPC_TLS_CA_FILE: ${GRPC_TLS_CA_FILE:-}
      GRPC_TLS_CERT_FILE: ${GRPC_TLS_CERT_FILE:-}
      GRPC_TLS_KEY_FILE: ${GRPC_TLS_KEY_FILE:-}
      GRPC_TLS_REQUIRE_CLIENT_CERT: ${GRPC_TLS_REQUIRE_CLIENT_CERT:-false}
      GRPC_REFLECTION_ENABLED: ${GRPC_REFLECTION_ENABLED:-false}
      DATABASE_URL: postgres://postgres:${POSTGRES_POST_PASSWORD:?POSTGRES_POST_PASSWORD is required}@postgres_post:5432/postdb?sslmode=disable
      DB_MAX_OPEN_CONNS: ${DB_MAX_OPEN_CONNS:-25}
      DB_MAX_IDLE_CONNS: ${DB_MAX_IDLE_CONNS:-10}
      DB_CONN_MAX_LIFETIME: ${DB_CONN_MAX_LIFETIME:-60}
      DB_MIGRATION_PATH: ${DB_MIGRATION_PATH:-./migrations}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:?RABBITMQ_USER is required}:${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}@rabbitmq:5672/${RABBITMQ_VHOST:?RABBITMQ_VHOST is required}
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE:-microservices_events}
      AUTH_SERVICE_GRPC_ADDR: auth-service:50051
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      postgres_post:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - internal_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${POST_SERVICE_PORT:-8083}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
      args:
        - BUILD_ENV=production
    container_name: microservices_notification_service
    expose:
      - "${NOTIFICATION_SERVICE_PORT:-8084}"
    env_file:
      - ./services/notification-service/.env
    environment:
      PORT: ${NOTIFICATION_SERVICE_PORT:-8084}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      INTERNAL_HTTP_TRUST_MODE: ${INTERNAL_HTTP_TRUST_MODE:?INTERNAL_HTTP_TRUST_MODE is required}
      DATABASE_URL: postgres://postgres:${POSTGRES_NOTIFICATION_PASSWORD:?POSTGRES_NOTIFICATION_PASSWORD is required}@postgres_notification:5432/notificationdb?sslmode=disable
      DB_MAX_OPEN_CONNS: ${DB_MAX_OPEN_CONNS:-25}
      DB_MAX_IDLE_CONNS: ${DB_MAX_IDLE_CONNS:-10}
      DB_CONN_MAX_LIFETIME: ${DB_CONN_MAX_LIFETIME:-60}
      DB_MIGRATION_PATH: ${DB_MIGRATION_PATH:-./migrations}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:?RABBITMQ_USER is required}:${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}@rabbitmq:5672/${RABBITMQ_VHOST:?RABBITMQ_VHOST is required}
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE:-microservices_events}
      RABBITMQ_QUEUE: ${RABBITMQ_QUEUE_NOTIFICATIONS:-post_notifications}
      RABBITMQ_ROUTING_KEY: ${RABBITMQ_NOTIFICATION_BINDINGS:-post.*,rfq.created,quote.submitted}
      RABBITMQ_DLX: ${RABBITMQ_DLX:-blog_events.dlx}
      RABBITMQ_DLQ: ${RABBITMQ_DLQ:-post_notifications_dlq}
      RABBITMQ_DLQ_ROUTING_KEY: ${RABBITMQ_DLQ_ROUTING_KEY:-post.failed}
      RABBITMQ_PREFETCH_COUNT: ${RABBITMQ_PREFETCH_COUNT:-10}
      RABBITMQ_RECONNECT_DELAY: ${RABBITMQ_RECONNECT_DELAY:-5}
      RABBITMQ_MAX_RETRIES: ${RABBITMQ_MAX_RETRIES:-3}
      NOTIFICATION_CLEANUP_DAYS: ${NOTIFICATION_CLEANUP_DAYS:-30}
      NOTIFICATION_BATCH_SIZE: ${NOTIFICATION_BATCH_SIZE:-100}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-Fiberlane <rfq@fiberlane.dev>}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      postgres_notification:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - internal_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${NOTIFICATION_SERVICE_PORT:-8084}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  search-service:
    build:
      context: .
      dockerfile: services/search-service/Dockerfile
      args:
        - BUILD_ENV=production
    container_name: microservices_search_service
    expose:
      - "50054"
      - "${SEARCH_SERVICE_METRICS_HTTP_PORT:-9095}"
    env_file:
      - ./services/search-service/.env
    environment:
      GRPC_PORT: 50054
      METRICS_HTTP_PORT: ${SEARCH_SERVICE_METRICS_HTTP_PORT:-9095}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SERVICE_TRANSPORT_SECURITY: ${SERVICE_TRANSPORT_SECURITY:?SERVICE_TRANSPORT_SECURITY must be mesh or app_mtls}
      GRPC_TLS_ENABLED: ${GRPC_TLS_ENABLED:-false}
      GRPC_TLS_CA_FILE: ${GRPC_TLS_CA_FILE:-}
      GRPC_TLS_CERT_FILE: ${GRPC_TLS_CERT_FILE:-}
      GRPC_TLS_KEY_FILE: ${GRPC_TLS_KEY_FILE:-}
      GRPC_TLS_REQUIRE_CLIENT_CERT: ${GRPC_TLS_REQUIRE_CLIENT_CERT:-false}
      GRPC_REFLECTION_ENABLED: ${GRPC_REFLECTION_ENABLED:-false}
      # Read-only access to the catalog DB (owned by post-service) for pgvector ranking.
      CATALOG_DATABASE_URL: postgres://postgres:${POSTGRES_POST_PASSWORD:?POSTGRES_POST_PASSWORD is required}@postgres_post:5432/postdb?sslmode=disable
      DB_MAX_OPEN_CONNS: ${DB_MAX_OPEN_CONNS:-25}
      DB_MAX_IDLE_CONNS: ${DB_MAX_IDLE_CONNS:-10}
      DB_CONN_MAX_LIFETIME: ${DB_CONN_MAX_LIFETIME:-60}
      REDIS_URL: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      REDIS_DB: ${REDIS_DB:-0}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-haiku-4-5}
      VOYAGE_API_KEY: ${VOYAGE_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CACHE_TTL_HOURS: ${SEARCH_CACHE_TTL_HOURS:-24}
    depends_on:
      postgres_post:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal_net
    restart: unless-stopped

  design-service:
    build:
      context: .
      dockerfile: services/design-service/Dockerfile
      args:
        - BUILD_ENV=production
    container_name: microservices_design_service
    expose:
      - "${DESIGN_SERVICE_PORT:-8086}"
      - "50056"
    env_file:
      - ./services/design-service/.env
    environment:
      PORT: ${DESIGN_SERVICE_PORT:-8086}
      GRPC_PORT: 50056
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      SERVICE_TRANSPORT_SECURITY: ${SERVICE_TRANSPORT_SECURITY:?SERVICE_TRANSPORT_SECURITY must be mesh or app_mtls}
      INTERNAL_HTTP_TRUST_MODE: ${INTERNAL_HTTP_TRUST_MODE:?INTERNAL_HTTP_TRUST_MODE is required}
      GRPC_TLS_ENABLED: ${GRPC_TLS_ENABLED:-false}
      GRPC_TLS_CA_FILE: ${GRPC_TLS_CA_FILE:-}
      GRPC_TLS_CERT_FILE: ${GRPC_TLS_CERT_FILE:-}
      GRPC_TLS_KEY_FILE: ${GRPC_TLS_KEY_FILE:-}
      GRPC_TLS_REQUIRE_CLIENT_CERT: ${GRPC_TLS_REQUIRE_CLIENT_CERT:-false}
      GRPC_REFLECTION_ENABLED: ${GRPC_REFLECTION_ENABLED:-false}
      DATABASE_URL: postgres://postgres:${POSTGRES_DESIGN_PASSWORD:?POSTGRES_DESIGN_PASSWORD is required}@postgres_design:5432/designdb?sslmode=disable
      DB_MAX_OPEN_CONNS: ${DB_MAX_OPEN_CONNS:-25}
      DB_MAX_IDLE_CONNS: ${DB_MAX_IDLE_CONNS:-10}
      DB_CONN_MAX_LIFETIME: ${DB_CONN_MAX_LIFETIME:-60}
      DB_MIGRATION_PATH: ${DB_MIGRATION_PATH:-./migrations}
      # S3_ENDPOINT is a BROWSER-reachable host: presigned URLs are dialed by the
      # client, not by design-service. design-service only signs, never connects.
      S3_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-localhost:9000}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      S3_BUCKET: ${S3_BUCKET:-design-files}
      S3_USE_SSL: "false"
      PRESIGN_TTL: ${PRESIGN_TTL:-15m}
    depends_on:
      postgres_design:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - internal_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${DESIGN_SERVICE_PORT:-8086}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  catalog-service:
    build:
      context: .
      dockerfile: services/catalog-service/Dockerfile
      args:
        - BUILD_ENV=production
    container_name: microservices_catalog_service
    expose:
      - "${CATALOG_SERVICE_PORT:-8087}"
      - "50057"
    env_file:
      - ./services/catalog-service/.env
    environment:
      PORT: ${CATALOG_SERVICE_PORT:-8087}
      GRPC_PORT: 50057
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      SERVICE_TRANSPORT_SECURITY: ${SERVICE_TRANSPORT_SECURITY:?SERVICE_TRANSPORT_SECURITY must be mesh or app_mtls}
      INTERNAL_HTTP_TRUST_MODE: ${INTERNAL_HTTP_TRUST_MODE:?INTERNAL_HTTP_TRUST_MODE is required}
      GRPC_TLS_ENABLED: ${GRPC_TLS_ENABLED:-false}
      GRPC_TLS_CA_FILE: ${GRPC_TLS_CA_FILE:-}
      GRPC_TLS_CERT_FILE: ${GRPC_TLS_CERT_FILE:-}
      GRPC_TLS_KEY_FILE: ${GRPC_TLS_KEY_FILE:-}
      GRPC_TLS_REQUIRE_CLIENT_CERT: ${GRPC_TLS_REQUIRE_CLIENT_CERT:-false}
      GRPC_REFLECTION_ENABLED: ${GRPC_REFLECTION_ENABLED:-false}
      DATABASE_URL: postgres://postgres:${POSTGRES_CATALOG_PASSWORD:?POSTGRES_CATALOG_PASSWORD is required}@postgres_catalog:5432/catalogdb?sslmode=disable
      DB_MAX_OPEN_CONNS: ${DB_MAX_OPEN_CONNS:-25}
      DB_MAX_IDLE_CONNS: ${DB_MAX_IDLE_CONNS:-10}
      DB_CONN_MAX_LIFETIME: ${DB_CONN_MAX_LIFETIME:-60}
      DB_MIGRATION_PATH: ${DB_MIGRATION_PATH:-./migrations}
    depends_on:
      postgres_catalog:
        condition: service_healthy
    networks:
      - internal_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${CATALOG_SERVICE_PORT:-8087}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # API Gateway
  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
      args:
        - BUILD_ENV=production
    container_name: microservices_api_gateway
    ports:
      - "${API_GATEWAY_PORT:-8080}:${API_GATEWAY_PORT:-8080}"
    env_file:
      - ./services/api-gateway/.env
    environment:
      PORT: ${API_GATEWAY_PORT:-8080}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SERVICE_TRANSPORT_SECURITY: ${SERVICE_TRANSPORT_SECURITY:?SERVICE_TRANSPORT_SECURITY must be mesh or app_mtls}
      GRPC_TLS_ENABLED: ${GRPC_TLS_ENABLED:-false}
      GRPC_TLS_CA_FILE: ${GRPC_TLS_CA_FILE:-}
      GRPC_TLS_CERT_FILE: ${GRPC_TLS_CERT_FILE:-}
      GRPC_TLS_KEY_FILE: ${GRPC_TLS_KEY_FILE:-}
      GRPC_TLS_REQUIRE_CLIENT_CERT: ${GRPC_TLS_REQUIRE_CLIENT_CERT:-false}
      SERVER_READ_TIMEOUT: ${SERVER_READ_TIMEOUT:-30}
      SERVER_WRITE_TIMEOUT: ${SERVER_WRITE_TIMEOUT:-30}
      SERVER_IDLE_TIMEOUT: ${SERVER_IDLE_TIMEOUT:-60}
      REDIS_URL: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      REDIS_DB: ${REDIS_DB:-0}
      AUTH_SERVICE_URL: http://auth-service:${AUTH_SERVICE_PORT:-8081}
      AUTH_SERVICE_GRPC_ADDR: auth-service:50051
      USER_SERVICE_URL: http://user-service:${USER_SERVICE_PORT:-8082}
      USER_SERVICE_GRPC_ADDR: user-service:50052
      POST_SERVICE_URL: http://post-service:${POST_SERVICE_PORT:-8083}
      POST_SERVICE_GRPC_ADDR: post-service:50053
      SEARCH_SERVICE_GRPC_ADDR: search-service:50054
      DESIGN_SERVICE_GRPC_ADDR: design-service:50056
      CATALOG_SERVICE_GRPC_ADDR: catalog-service:50057
      NOTIFICATION_SERVICE_URL: http://notification-service:${NOTIFICATION_SERVICE_PORT:-8084}
      RATE_LIMIT_RPM: ${RATE_LIMIT_RPM:-100}
      RATE_LIMIT_BURST: ${RATE_LIMIT_BURST:-20}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      CORS_ALLOWED_METHODS: ${CORS_ALLOWED_METHODS:-GET,POST,PUT,DELETE,OPTIONS}
      CORS_ALLOWED_HEADERS: ${CORS_ALLOWED_HEADERS:-Content-Type,Authorization}
      CORS_EXPOSE_HEADERS: ${CORS_EXPOSE_HEADERS:-Content-Length,Access-Control-Allow-Origin,Access-Control-Allow-Headers,Content-Type,X-RateLimit-Limit,X-RateLimit-Remaining,X-RateLimit-Reset}
      CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS:-true}
      AUTH_REFRESH_TOKEN_COOKIE: ${AUTH_REFRESH_TOKEN_COOKIE:-true}
      AUTH_REFRESH_TOKEN_COOKIE_SAMESITE: ${AUTH_REFRESH_TOKEN_COOKIE_SAMESITE:-Lax}
      AUTH_COOKIE_DOMAIN: ${AUTH_COOKIE_DOMAIN:-}
      REQUEST_MAX_BODY_BYTES: ${REQUEST_MAX_BODY_BYTES:-1048576}
      TRUSTED_PROXIES: ${TRUSTED_PROXIES:-}
    depends_on:
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      post-service:
        condition: service_healthy
      search-service:
        condition: service_started
      notification-service:
        # Not service_healthy: notification-service is a non-critical async
        # consumer that crash-loops until RabbitMQ is ready on a cold start. The
        # gateway only references its URL in the aggregate /health check, so
        # gating the gateway on its health blocked the whole API from starting
        # ("dependency ... is unhealthy"). service_started is sufficient.
        condition: service_started
    networks:
      - edge_net
      - internal_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--output-document=/dev/null", "http://localhost:${API_GATEWAY_PORT:-8080}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: microservices_prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - internal_net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.0
    container_name: microservices_grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    networks:
      - internal_net
    restart: unless-stopped
    depends_on:
      - prometheus

volumes:
  redis_data:
    driver: local
  postgres_user_data:
    driver: local
  postgres_post_data:
    driver: local
  postgres_notification_data:
    driver: local
  postgres_design_data:
    driver: local
  postgres_catalog_data:
    driver: local
  minio_data:
    driver: local
  rabbitmq_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  edge_net:
    driver: bridge
  internal_net:
    driver: bridge
