syntax = "proto3";

package rfq.v1;

import "google/protobuf/empty.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/nikitashilov/microblog_grpc/proto/rfq/v1;rfqv1";

message RFQ {
  string id                       = 1;   // RFQ-YYYYMMDD-NNNN-SZX
  string buyer_id                 = 2;   // soft ref to users(id) in user-service
  string query_text               = 3;
  google.protobuf.Struct parsed_specs = 4;
  repeated string matched_product_ids = 5;
  string status                   = 6;   // open | quoted | accepted | closed
  int32  qty                      = 7;
  string target_date              = 8;   // ISO-8601 date
  string shipping_address         = 9;
  string notes                    = 10;
  google.protobuf.Timestamp created_at = 11;
  string buyer_email              = 12;  // denormalized at creation; notification emails need it
  string buyer_company            = 13;  // shown to suppliers on the magic-link page
  string project_id               = 14;  // links to a design-service Project (custom-PCBA pivot); optional
}

message Quote {
  string id              = 1;   // QUOTE-YYYYMMDD-NNNN-SZX
  string rfq_id          = 2;
  string supplier_id     = 3;
  string product_id      = 4;   // optional
  double price_usd       = 5;
  int32  lead_time_days  = 6;
  string validity_date   = 7;   // ISO-8601 date
  string supplier_notes  = 8;
  int32  match_score     = 9;   // 0..100, AI-generated
  string status          = 10;  // pending | submitted | accepted | rejected
  google.protobuf.Timestamp submitted_at = 11;
  google.protobuf.Timestamp created_at   = 12;
  string manufacturer_id = 13;  // set when a logged-in manufacturer quotes; supplier_id blank then
}

message CreateRFQRequest {
  RFQ rfq = 1;
}

message GetRFQRequest {
  string id = 1;
  string requesting_user_id = 2;   // gateway-passed; service enforces authz
}

message ListRFQsRequest {
  string buyer_id = 1;
  int32  limit    = 2;
  int32  offset   = 3;
  string status   = 4;
}

message ListRFQsResponse {
  repeated RFQ rfqs = 1;
  int32 total = 2;
}

// ListOpenRFQs is the manufacturer-facing board of open quote requests. No
// buyer filter: any authenticated manufacturer sees all open RFQs. Buyer email
// and shipping address are blanked server-side (see ListRFQsResponse reuse).
message ListOpenRFQsRequest {
  int32 limit  = 1;
  int32 offset = 2;
}

message AddQuoteRequest {
  Quote quote = 1;
}

// SubmitManufacturerQuote is the logged-in manufacturer path: no pre-created
// pending row and no magic-link. The gateway resolves manufacturer_id from the
// authenticated user before calling; the service inserts a fresh quote.
message SubmitManufacturerQuoteRequest {
  string rfq_id          = 1;
  string manufacturer_id = 2;
  string product_id      = 3;   // optional
  double price_usd       = 4;
  int32  lead_time_days  = 5;
  string validity_date   = 6;   // ISO-8601 date
  string supplier_notes  = 7;
}

// AcceptQuote is the buyer accepting one quote on their RFQ. The service
// enforces buyer ownership (actor_id == rfq.buyer_id), flips the RFQ + quote to
// accepted, and publishes quote.accepted so order-service creates the order.
message AcceptQuoteRequest {
  string rfq_id   = 1;
  string quote_id = 2;
  string actor_id = 3;   // gateway-passed buyer id
}

message ListQuotesForRFQRequest {
  string rfq_id = 1;
  string requesting_user_id = 2;   // gateway-passed; service enforces buyer ownership
}

message ListQuotesResponse {
  repeated Quote quotes = 1;
}

// Supplier-facing view, resolved from a validated magic-link token. The
// gateway maps token -> (rfq_id, supplier_id); the service returns only what
// the supplier RFQ response page needs (no buyer email).
message GetRFQForSupplierRequest {
  string rfq_id      = 1;
  string supplier_id = 2;
}

message SupplierRFQView {
  RFQ    rfq           = 1;  // buyer_email is blanked server-side
  Quote  quote         = 2;  // this supplier's quote row (pending or submitted)
  string supplier_name = 3;
}

service RFQService {
  rpc CreateRFQ(CreateRFQRequest)                  returns (RFQ);
  rpc GetRFQ(GetRFQRequest)                        returns (RFQ);
  rpc ListRFQs(ListRFQsRequest)                    returns (ListRFQsResponse);
  rpc ListOpenRFQs(ListOpenRFQsRequest)            returns (ListRFQsResponse);
  rpc AddQuote(AddQuoteRequest)                    returns (Quote);
  rpc SubmitManufacturerQuote(SubmitManufacturerQuoteRequest) returns (Quote);
  rpc AcceptQuote(AcceptQuoteRequest)              returns (Quote);
  rpc ListQuotesForRFQ(ListQuotesForRFQRequest)    returns (ListQuotesResponse);
  rpc GetRFQForSupplier(GetRFQForSupplierRequest)  returns (SupplierRFQView);
  rpc HealthCheck(google.protobuf.Empty)           returns (google.protobuf.Empty);
}
